<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Makerthon 2026 - Judging Portal</title>
  <style>
    .floating-save-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #ffa500;
      color: white;
      padding: 15px 25px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: 0.3s;
      z-index: 1000;
    }

    .floating-save-btn:hover { background: #800000; transform: scale(1.05); }
    .floating-save-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
    .container { max-width: 900px; margin: 0 auto; }
    .header-banner {
      width: 100%;
      height: auto;
      max-height: 250px; /* Prevents it from being too tall on huge screens */
      object-fit: cover;
      display: block;
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
    }
    
    /* We remove the default padding from header-card to let the image touch the edges */
    .header-card { 
      background: white; 
      border-radius: 10px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
      margin-bottom: 20px; 
      /* removed the flex alignment here so the image spans properly */
    }
    
    /* New container for the text under the banner */
    .header-text-container {
      padding: 20px;
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      text-align: center;
    }
    .status-msg { padding: 10px; border-radius: 5px; text-align: center; font-weight: bold; margin-top: 10px; }
    
    /* Group Card Styling */
    .group-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; border-left: 5px solid #0056b3; border-right: 5px solid #ffa500;}
    .group-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
    .drive-btn { align-self: center;white-space: nowrap;height: fit-content;background: #0F9D58; color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; font-size: 14px; }
    .drive-btn:hover { background: #0b7a44; }
    
    /* Scoring Grid */
    .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .score-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 10px; border-radius: 5px; }
    .score-input { width: 60px; padding: 5px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; }
    
    /* Total & Action */
    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; }
    .total-score { font-size: 18px; font-weight: bold; color: #b30000; }
    .save-btn { background: #0056b3; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .save-btn:hover { background: #003d82; }
    .save-btn:disabled { background: #ccc; cursor: not-allowed; }

    /* 📱 MOBILE RESPONSIVENESS (Media Query) */
    @media (max-width: 600px) {
      /* 1. Change the 2-column grid into a 1-column stack */
      .score-grid { 
        grid-template-columns: 1fr; 
      }

      /* 2. Stack the Group Title and Drive Button so they don't overlap */
      .group-header { 
        flex-direction: column; 
        align-items: flex-start; 
        gap: 15px; 
      }
      
      /* Make the Drive button full-width for easy thumb tapping */
      .drive-btn { 
        width: 100%; 
        box-sizing: border-box; 
        text-align: center; 
      }

      /* 3. Stack the Total Score and Save Button */
      .card-footer { 
        flex-direction: column; 
        gap: 15px; 
      }
      .save-btn { 
        width: 100%; 
      }

      /* 4. Adjust the floating Save All button so it fits nicely on a phone */
      .floating-save-btn {
        bottom: 15px;
        right: 15px;
        padding: 12px 20px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-card">
      <img src="logo.png" alt="Makerthon Banner" class="header-banner">
      
      <div class="header-text-container">
        <h1 style="margin:0; color:#000000;">Makerthon 2026 Internal Evaluation Form</h1>
        <div id="system-status" class="status-msg">Connecting to database...</div>
      </div>
    </div>
    
    <div id="groups-container" style="display: none;"></div>
  </div>

  <button id="save-all-btn" class="floating-save-btn" onclick="saveAllScores()" style="display: none;">
    💾 Save All Groups Score
  </button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 🔴 YOUR FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyAZf2-YhpXH6HNDZ_D_OfVAeHF_oHoQz2k",
      authDomain: "makerthon-2026-internal.firebaseapp.com",
      projectId: "makerthon-2026-internal",
      storageBucket: "makerthon-2026-internal.firebasestorage.app",
      messagingSenderId: "226161391410",
      appId: "1:226161391410:web:542e04190eaeb37423092b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const judgeId = urlParams.get('id');
    
    // The 6 Criteria for Makerthon
    const criteria = [
      { id: 'ps', label: 'Problem Statement' },
      { id: 'inn', label: 'Innovation' },
      { id: 'wd', label: 'Working Design' },
      { id: 'comp', label: 'Complexity' },
      { id: 'cost', label: 'Design Cost' },
      { id: 'pres', label: 'Presentation' }
    ];

    // ✅ REVISION 2: The Group Configuration Array
    // You can easily change "Group 1 Name Here" to the actual team names later.
    const groupsData = [
      { id: 'G1', title: 'Group 1 - Smart Classroom Attendance & Automation System', link: 'https://drive.google.com/drive/folders/17gHjZh9qd1M9HNS0DQS_JaKhStlIAXu0?usp=drive_link' },
      { id: 'G2', title: 'Group 2 - Laser-Based Security System', link: 'https://drive.google.com/drive/folders/1hxixf6vHE8fTXUoTJ9E2c3sSoWN8p9vQ?usp=drive_link' },
      { id: 'G3', title: 'Group 3 - Smart Attendance System ', link: 'https://drive.google.com/drive/folders/1l0n1ydzOe1cspA1u3qUQqcUJvh0Ptw6A?usp=drive_link' },
      { id: 'G4', title: 'Group 4 - NFC-Enabled Smart Card System for Campus Services', link: 'https://drive.google.com/drive/folders/1PPUNT6wN61EQfNTBim9mS2Zu-T1kVegg?usp=drive_link' },
      { id: 'G5', title: 'Group 5 - Automated Enviromental Monitoring System', link: 'https://drive.google.com/drive/folders/1c5AEdKibtrQow9eZNwb97_f2kPm8gSlT?usp=drive_link' },
      { id: 'G6', title: 'Group 6 - Smart RFID-Based Dormitory Security System', link: 'https://drive.google.com/drive/folders/1HSit3MYvUwcBAv51yES3M4YdoXoDEj38?usp=drive_link' },
      { id: 'G7', title: 'Group 7 - Spongebob Nopants', link: 'https://drive.google.com/drive/folders/1wX31obFk7WjJvsQJUiN03dB9pDbP8JEP?usp=drive_link' },
      { id: 'G8', title: 'Group 8 - Hazard Lab Helper', link: 'https://drive.google.com/drive/folders/1LyM-qDyYhF71ZF8wi1QsOa4T0tex9Kxc?usp=drive_link' }
    ];

    let currentJudgeData = {};
    let unsavedChanges = false;

    async function initializeSystem() {
      const statusDiv = document.getElementById('system-status');
      if (!judgeId) {
        statusDiv.innerHTML = "❌ Invalid Link. Kindly use the private link provided by the admin.";
        statusDiv.style.background = "#ffe8e8"; statusDiv.style.color = "red";
        return;
      }

      try {
        const docRef = doc(db, "judges", judgeId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          currentJudgeData = docSnap.data();
          statusDiv.innerHTML = `Greetings, <strong>${currentJudgeData.name}</strong>. Kindly evaluate all 8 groups below.`;
          statusDiv.style.background = "#e8f5e9"; statusDiv.style.color = "green";
          
          buildGroupCards();
          document.getElementById('groups-container').style.display = "block";
          document.getElementById('save-all-btn').style.display = "block";
        } else {
          statusDiv.innerHTML = "❌ Judge ID not found in the database.";
          statusDiv.style.background = "#ffe8e8"; statusDiv.style.color = "red";
        }
      } catch (error) {
        statusDiv.innerHTML = "❌ Database Error. Check console.";
      }
    }

    function buildGroupCards() {
      const container = document.getElementById('groups-container');
      container.innerHTML = ""; 

      // Loop through the groupsData array instead of a generic counter
      groupsData.forEach(group => {
        const savedScores = currentJudgeData.scores ? currentJudgeData.scores[group.id] : null;

        let gridHTML = "";
        criteria.forEach(c => {
          let val = savedScores ? savedScores[c.id] : ""; 
          // Added enforceValidation(this) to the oninput event
          gridHTML += `
            <div class="score-item">
              <label>${c.label} (Max 30)</label>
              <input type="number" class="score-input" id="${group.id}-${c.id}" value="${val}" oninput="enforceValidation(this); calculateTotal('${group.id}')">
            </div>
          `;
        });

        let totalVal = savedScores ? savedScores.total : 0;

        const cardHTML = `
          <div class="group-card" id="card-${group.id}">
            <div class="group-header">
              <h2 style="margin:0;">${group.title}</h2>
              <a href="${group.link}" target="_blank" class="drive-btn">📁 View Google Drive</a>
            </div>
            <div class="score-grid">${gridHTML}</div>
            <div class="card-footer">
              <div class="total-score">Total: <span id="total-${group.id}">${totalVal}</span> / 180</div>
              <button class="save-btn" id="btn-${group.id}" onclick="saveGroupScore('${group.id}')">💾 Save Score</button>
            </div>
          </div>
        `;
        container.innerHTML += cardHTML;
      });
    }

    // ✅ REVISION 1: Strict input validation function
    window.enforceValidation = function(inputElement) {
      // Tell the system they have unsaved work
      unsavedChanges = true; 

      // 1. Strip out any non-numeric characters (like 'e', '.', '-')
      inputElement.value = inputElement.value.replace(/[^0-9]/g, '');
      
      // 2. Convert to integer and clamp between 0 and 30
      if (inputElement.value !== "") {
        let val = parseInt(inputElement.value);
        if (val > 30) inputElement.value = 30;
        if (val < 0) inputElement.value = 0;
      }
    };

    window.calculateTotal = function(groupId) {
      let total = 0;
      criteria.forEach(c => {
        let val = parseInt(document.getElementById(`${groupId}-${c.id}`).value) || 0;
        total += val; // We don't need to limit to 30 here anymore, enforceValidation handles it!
      });
      document.getElementById(`total-${groupId}`).innerText = total;
    };

    window.saveGroupScore = async function(groupId) {
      const btn = document.getElementById(`btn-${groupId}`);
      btn.innerText = "⏳ Saving..."; btn.disabled = true;

      let groupData = {};
      let total = 0;
      criteria.forEach(c => {
        let val = parseInt(document.getElementById(`${groupId}-${c.id}`).value) || 0;
        groupData[c.id] = val;
        total += val;
      });
      groupData.total = total;

      try {
        const docRef = doc(db, "judges", judgeId);
        await setDoc(docRef, {
          scores: {
            [groupId]: groupData
          }
        }, { merge: true });

        // They saved it, so reset the warning tracker!
        unsavedChanges = false;

        btn.innerText = "✅ Saved!";
        btn.style.background = "green";
        setTimeout(() => { btn.innerText = "💾 Update Score"; btn.disabled = false; btn.style.background = "#0056b3"; }, 2000);
      } catch (e) {
        console.error("Save failed:", e);
        btn.innerText = "❌ Error"; btn.disabled = false;
      }
    };

    // ✅ REVISION 3: The Master "Save All" Function
    window.saveAllScores = async function() {
      const mainBtn = document.getElementById('save-all-btn');
      mainBtn.innerText = "⏳ Saving All...";
      mainBtn.disabled = true;

      let allScores = {};
      
      // 1. Loop through all 8 groups and gather their current input values
      groupsData.forEach(group => {
        let groupData = {};
        let total = 0;
        criteria.forEach(c => {
          let val = parseInt(document.getElementById(`${group.id}-${c.id}`).value) || 0;
          groupData[c.id] = val;
          total += val;
        });
        groupData.total = total;
        allScores[group.id] = groupData;
        
        // Change individual buttons to loading state visually
        let indBtn = document.getElementById(`btn-${group.id}`);
        if(indBtn) { indBtn.innerText = "⏳..."; indBtn.disabled = true; }
      });

      try {
        // 2. Send ONE single payload to Firebase (Highly efficient!)
        const docRef = doc(db, "judges", judgeId);
        await setDoc(docRef, {
          scores: allScores
        }, { merge: true });

        // Reset the browser warning
        unsavedChanges = false;

        // 3. UI Success Feedback
        mainBtn.innerText = "✅ All Groups Saved!";
        mainBtn.style.background = "green";

        groupsData.forEach(group => {
          let indBtn = document.getElementById(`btn-${group.id}`);
          if(indBtn) {
             indBtn.innerText = "✅ Saved!";
             indBtn.style.background = "green";
          }
        });

        // 4. Reset buttons after 3 seconds
        setTimeout(() => { 
          mainBtn.innerText = "💾 Save All Groups"; 
          mainBtn.disabled = false; 
          mainBtn.style.background = "#b30000"; 
          
          groupsData.forEach(group => {
            let indBtn = document.getElementById(`btn-${group.id}`);
            if(indBtn) {
               indBtn.innerText = "💾 Update Score"; 
               indBtn.disabled = false; 
               indBtn.style.background = "#0056b3";
            }
          });
        }, 3000);

      } catch (e) {
        console.error("Save all failed:", e);
        mainBtn.innerText = "❌ Error Saving"; 
        mainBtn.disabled = false;
      }
    };

    // ✅ The Browser Warning Mechanism
    window.addEventListener("beforeunload", function (e) {
      if (unsavedChanges) {
        // This triggers the browser's standard leave confirmation box
        e.preventDefault(); 
        e.returnValue = ''; 
      }
    });

    initializeSystem();
  </script>
